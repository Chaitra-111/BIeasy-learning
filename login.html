<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | BIeasy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            max-width: 450px;
            margin: 140px auto 80px;
            background: white;
            padding: 48px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .login-footer {
            margin-top: 32px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <a href="index.html" class="logo">
                <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="#1e40af"/>
                    <path d="M12 28V12H16C18.2091 12 20 13.7909 20 16C20 18.2091 18.2091 20 16 20H12M12 20H16C18.2091 20 20 21.7909 20 24C20 26.2091 18.2091 28 16 28H12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M28 12V28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                <span>BIeasy</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="subjects.html">Subjects</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="student-portal.html" class="active">Student Portal</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="login-container">
            <h2 style="margin-bottom: 12px;">Student Login</h2>
            <p class="text-muted" style="margin-bottom: 32px;">Access your courses and live sessions.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div style="text-align: right; margin-bottom: 24px;">
                    <a href="#" style="font-size: 0.85rem; color: var(--primary);">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
            </form>

            <div class="login-footer">
                <p>New to BIeasy? <a href="packages.html" style="color: var(--primary); font-weight: 600;">Enroll in a course</a></p>
            </div>
            
            <!-- Dummy Credentials Hint -->
            <div style="margin-top: 32px; padding: 12px; background: #fefce8; border: 1px solid #fef08a; border-radius: 8px; font-size: 0.8rem; color: #854d0e;">
                <strong>Demo Access:</strong> Use any email and password to log in.
            </div>
        </div>
    </main>

    <footer style="margin-top: 80px;">
        <div class="container footer-bottom text-center">
            <p>&copy; 2026 BIeasy Educational Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        // Simulate Login with actual account check
        const loginForm = document.getElementById('login-form');
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Try to find the account
            const accountData = localStorage.getItem('bieasy_account_' + email);
            
            if (accountData) {
                const account = JSON.parse(accountData);
                if (account.password === password) {
                    // Save mock session
                    localStorage.setItem('bieasy_student', JSON.stringify({
                        name: email.split('@')[0],
                        email: email,
                        isLoggedIn: true
                    }));
                    
                    alert('Login Successful!');
                    window.location.href = 'student-portal.html';
                } else {
                    alert('Invalid password. Please try again.');
                }
            } else {
                alert('Account not found. Please enroll first to create an account.');
                window.location.href = 'packages.html';
            }
        });
    </script>
</body>
</html>
